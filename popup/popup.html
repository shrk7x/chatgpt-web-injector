<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT Web Injector</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Templates</h1>
      <ul id="template-list" class="template-list" role="listbox" aria-label="Templates"></ul>
      <div class="settings-section">
        <div class="setting-row">
          <span id="temp-chat-label" class="setting-text">Use Temporary Chat</span>
          <label class="switch">
            <input type="checkbox" id="youtube-temp-chat-toggle" aria-labelledby="temp-chat-label">
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <span id="tooltip-toggle-label" class="setting-text">Show floating BOT button</span>
          <label class="switch">
            <input type="checkbox" id="floating-bot-toggle" aria-labelledby="tooltip-toggle-label">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="footer">
        <button id="manage-btn" type="button" class="manage-link">Configure templates</button>
      </div>
    </div>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
